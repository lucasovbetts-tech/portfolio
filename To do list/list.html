<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../main page/style.css">
    <link rel="stylesheet" href="../To do list/list.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List — Lucas's Portfolio</title>
    <link rel="icon" href="../images/logo.png">
</head>
<body>
    <header class="top">
        <div class="branding">
            <img class="logo" src="../images/logo.png" alt="Logo">
            <h1>Lucas's portfolio</h1>
        </div>
        <nav class="headerLinks">
            <a href="../main page/index.html">Home</a>
            <div class="dropdown">
                <a href="">Projects</a>
                <div class="dropdownContent">
                    <a href="../Calculator/calculator.html">Calculator</a>
                    <a href="../To do list/list.html">To do list</a>
                    <a href="../Number guessing game/guess.html">Guessing game</a>
                    <a href="../income tax calc/tax.html">Tax calculator</a>
                    <a href="../dice roller/dice.html">Dice roller</a>
                </div>
            </div>
            <a href="https://github.com/" target="_blank">Github</a>
        </nav>
    </header>

    <!-- TO DO LIST PANEL -->
    <div class="toDoList">
        <h1>To Do List</h1>

        <!-- Input + Add -->
        <div class="inputRow">
            <input id="input" type="text" placeholder="Add a new task…">
            <button id="addItem">Add</button>
        </div>

        <!-- Delete actions -->
        <div class="actionRow">
            <button id="deleteSelected">Delete selected</button>
            <button id="delete">Delete all</button>
        </div>
    </div>

    <!-- Tasks render here by list.js -->
    <div id="taskList"></div>

    <footer class="footer">
        <div class="line"></div>
        <div class="contact-section">
            <h3>Get In Touch</h3>
            <div class="contact-info">
                <p>
                    <a href="mailto:lobetts@outlook.com">📧 lobetts@outlook.com</a>
                </p>
                <div class="social-links">
                    <a href="https://github.com/" target="_blank" title="GitHub">GitHub</a>
                    <span>•</span>
                    <a href="https://linkedin.com/" target="_blank" title="LinkedIn">LinkedIn</a>
                    <span>•</span>
                    <a href="https://twitter.com/" target="_blank" title="Twitter">Twitter</a>
                </div>
            </div>
        </div>
        <div class="line"></div>
    </footer>

    <script src="../To do list/list.js"></script>
</body>
</html>
