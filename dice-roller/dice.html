<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400..700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../main-page/style.css">
    <link rel="stylesheet" href="../dice-roller/dice.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Roller — Lucas's portfolio</title>
    <link rel="icon" href="../images/logo.png">
    <script src="../shared/theme.js"></script>
</head>
<body>
    <div id="site-header"></div>

    <div class="diceRoller">
        <h2>Dice Roller</h2>
        <div class="diceControls">
            <label for="numberOfDice">How many?</label>
            <input id="numberOfDice" type="number" min="1" placeholder="1">
            <button id="rollBtn">Roll</button>
        </div>
        <p id="diceRolled"></p>
        <div id="diceImages"></div>
    </div>

    <div id="site-footer"></div>

    <script src="../shared/header-footer.js"></script>
    <script src="dice.js"></script>
</body>
</html>
