<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400..700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../main-page/style.css">
    <link rel="stylesheet" href="../Number-guessing-game/guess.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guessing Game — Lucas's Portfolio</title>
    <link rel="icon" href="../images/logo.png">
</head>
<body>
    <div id="site-header"></div>

    <div class="game-container">
        <h1>Guess the Number</h1>
        <p id="instructions" class="subtitle">Choose a difficulty to start</p>

        <!-- Difficulty picker -->
        <div class="difficulty-row">
            <button class="diff-btn" data-diff="easy">Easy</button>
            <button class="diff-btn" data-diff="hard">Hard</button>
            <button class="diff-btn" data-diff="impossible">Impossible</button>
        </div>

        <!-- Guess input -->
        <input
            type="number"
            class="guess-input"
            id="guess-input"
            placeholder="Enter your guess…"
        >

        <!-- Attempts tracker -->
        <p id="attempts">Attempts: <span>0</span></p>

        <!-- Action buttons -->
        <div class="btn-row">
            <button class="guess-btn" id="guess-btn">Guess</button>
            <button class="guess-btn" id="reset-btn">Reset</button>
        </div>

        <!-- Result feedback -->
        <div class="result-box">
            <p id="result" class="result-text">Pick a difficulty and make your first guess</p>
        </div>
    </div>

    <div id="site-footer"></div>

    <script src="../shared/header-footer.js"></script>
    <script src="guess.js"></script>
</body>
</html>
