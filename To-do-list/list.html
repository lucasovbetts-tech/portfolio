<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../main-page/style.css">
    <link rel="stylesheet" href="../To-do-list/list.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="icon" href="../images/logo.png">
</head>
<body>
    <div id="site-header"></div>

    <!-- TO DO LIST PANEL -->
    <div class="toDoList">
        <h1>To Do List</h1>

        <!-- Input + Add -->
        <div class="inputRow">
            <input id="input" type="text" placeholder="Add a new task…">
            <button id="addItem">Add</button>
        </div>

        <!-- Delete actions -->
        <div class="actionRow">
            <button id="deleteSelected">Delete selected</button>
            <button id="delete">Delete all</button>
        </div>
    </div>

    <!-- Tasks render here by list.js -->
    <div id="taskList"></div>

    <div id="site-footer"></div>

    <script src="../shared/header-footer.js"></script>
    <script src="../To-do-list/list.js"></script>
</body>
</html>
