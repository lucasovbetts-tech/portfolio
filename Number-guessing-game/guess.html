<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../main-page/style.css">
    <link rel="stylesheet" href="../Number-guessing-game/guess.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guessing Game — Lucas's Portfolio</title>
    <link rel="icon" href="../images/logo.png">
</head>
<body>
    <header class="top">
        <div class="branding">
            <img class="logo" src="../images/logo.png" alt="Logo">
            <h1>Lucas's portfolio</h1>
        </div>
        <nav class="headerLinks">
            <a href="../main-page/index.html">Home</a>
            <div class="dropdown">
                <a href="">Projects</a>
                <div class="dropdownContent">
                    <a href="../Calculator/calculator.html">Calculator</a>
                    <a href="../To-do-list/list.html">To do list</a>
                    <a href="../Number-guessing-game/guess.html">Guessing game</a>
                    <a href="../income-tax-calc/tax.html">Tax calculator</a>
                    <a href="../dice-roller/dice.html">Dice roller</a>
                    <a href="https://lucasovbetts-tech.github.io/Macro-tracker/Tracker-app/" target="_blank">Macro tracker</a>
                </div>
            </div>
            <a href="https://github.com/" target="_blank">Github</a>
        </nav>
    </header>

    <div class="game-container">
        <h1>Guess the Number</h1>
        <p id="instructions" class="subtitle">Choose a difficulty to start</p>

        <!-- Difficulty picker -->
        <div class="difficulty-row">
            <button class="diff-btn" data-diff="easy">Easy</button>
            <button class="diff-btn" data-diff="hard">Hard</button>
            <button class="diff-btn" data-diff="impossible">Impossible</button>
        </div>

        <!-- Guess input -->
        <input
            type="number"
            class="guess-input"
            id="guess-input"
            placeholder="Enter your guess…"
        >

        <!-- Attempts tracker -->
        <p id="attempts">Attempts: <span>0</span></p>

        <!-- Action buttons -->
        <div class="btn-row">
            <button class="guess-btn" id="guess-btn">Guess</button>
            <button class="guess-btn" id="reset-btn">Reset</button>
        </div>

        <!-- Result feedback -->
        <div class="result-box">
            <p id="result" class="result-text">Pick a difficulty and make your first guess</p>
        </div>
    </div>

    <footer class="footer">
        <div class="line"></div>
        <div class="contact-section">
            <h3>Get In Touch</h3>
            <div class="contact-info">
                <p>
                    <a href="mailto:lobetts@outlook.com">📧 lobetts@outlook.com</a>
                </p>
                <div class="social-links">
                    <a href="https://github.com/" target="_blank" title="GitHub">GitHub</a>
                    <span>•</span>
                    <a href="https://linkedin.com/" target="_blank" title="LinkedIn">LinkedIn</a>
                    <span>•</span>
                    <a href="https://twitter.com/" target="_blank" title="Twitter">Twitter</a>
                </div>
            </div>
        </div>
        <div class="line"></div>
    </footer>

    <script src="guess.js"></script>
</body>
</html>
